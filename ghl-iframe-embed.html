<!-- ============================================================
     WhataHotel! Homes — GoHighLevel embed via iframe
     Paste this (and ONLY this) into the GHL Custom Code / HTML element,
     replacing the full page you pasted before.

     Why: this loads your page in its own isolated memory context, so it
     no longer competes with GHL's own scripts for iPhone memory — the
     robust fix for the "cannot open this page" crash.

     URL below assumes GitHub Pages is enabled on the repo (main / root):
        https://vincenzo182631.github.io/whathotel-search/
     If you deploy to Vercel instead, swap the src for your *.vercel.app URL.
     ============================================================ -->
<div style="position:relative;width:100%;min-height:100vh;">
  <iframe
    src="https://vincenzo182631.github.io/whathotel-search/"
    title="WhataHotel! Homes — Villas & Residences"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;"
    allow="fullscreen"></iframe>
</div>
